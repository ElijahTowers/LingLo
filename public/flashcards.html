<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingLo — Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --green: #22c55e;
      --red: #ef4444;
      --font-ui: 'Inter', -apple-system, sans-serif;
      --font-read: 'Lora', Georgia, serif;
    }

    body {
      font-family: var(--font-ui);
      background: #0d0d1a;
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: #a78bfa;
      text-decoration: none;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }

    /* ── Progress ── */
    .progress-area {
      padding: 20px 24px 0;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .progress-label { color: rgba(255,255,255,0.5); }
    .progress-counter { color: white; font-weight: 600; }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Card scene ── */
    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 32px;
    }

    .card-scene {
      perspective: 1200px;
      width: min(560px, 100%);
      height: 300px;
    }
    .flashcard {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      padding: 36px 40px;
    }

    /* Front */
    .card-front {
      background: white;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card-front-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    .card-word {
      font-family: var(--font-read);
      font-size: 2.4rem;
      font-weight: 600;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .card-source {
      font-size: 0.78rem;
      color: #9ca3af;
      font-style: italic;
    }
    .card-hint {
      position: absolute;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: #c4b5fd;
      opacity: 0.7;
    }

    /* Back */
    .card-back {
      background: linear-gradient(145deg, #1e1040, #2d1b69);
      transform: rotateY(180deg);
      border: 1px solid rgba(167, 139, 250, 0.2);
      justify-content: center;
    }
    .card-back-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 14px;
    }
    .card-translation {
      font-family: var(--font-read);
      font-size: 1.9rem;
      font-weight: 600;
      color: white;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .card-divider {
      height: 1px;
      background: rgba(167, 139, 250, 0.2);
      margin-bottom: 18px;
    }
    .card-sentence {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      font-style: italic;
    }
    .card-sentence .highlight {
      color: #c4b5fd;
      font-weight: 600;
      font-style: normal;
      background: rgba(124, 58, 237, 0.25);
      border-radius: 3px;
      padding: 0 3px;
    }
    .card-chapter {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
    }

    /* ── Buttons ── */
    .card-buttons {
      display: flex;
      gap: 16px;
      width: min(560px, 100%);
    }
    .answer-btn {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .answer-btn small {
      font-size: 0.72rem;
      font-weight: 400;
      opacity: 0.7;
    }
    .btn-know {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
      border: 1.5px solid rgba(34, 197, 94, 0.3);
    }
    .btn-know:hover { background: rgba(34, 197, 94, 0.25); border-color: var(--green); }
    .btn-dont {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
      border: 1.5px solid rgba(239, 68, 68, 0.25);
    }
    .btn-dont:hover { background: rgba(239, 68, 68, 0.22); border-color: var(--red); }
    .answer-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Keyboard hints ── */
    .key-hints {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
    .key-hints kbd {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: inherit;
    }

    /* ── Empty / done states ── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
    }
    .state-emoji { font-size: 4rem; }
    .state-title { font-size: 1.8rem; font-weight: 700; }
    .state-sub { color: rgba(255,255,255,0.5); max-width: 360px; line-height: 1.6; }
    .state-stats {
      display: flex;
      gap: 32px;
      margin-top: 8px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-num { font-size: 2rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }

    /* ── Shuffle / filter bar ── */
    .deck-bar {
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .deck-bar select {
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
    }
    .deck-bar select option { background: #1e1040; }
    .deck-count { font-size: 0.85rem; color: rgba(255,255,255,0.4); }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <header>
    <a class="logo" href="/">LingLo</a>
    <div class="header-right">
      <button class="btn btn-ghost" id="shuffle-btn">⇄ Shuffle</button>
      <a href="/" class="btn btn-ghost">← Library</a>
    </div>
  </header>

  <div class="deck-bar">
    <select id="book-filter"><option value="">All books</option></select>
    <span class="deck-count" id="deck-count"></span>
  </div>

  <div id="app"></div>

  <script>
    let allWords = [];
    let deck = [];
    let currentIdx = 0;
    let known = 0;
    let unknown = 0;
    let flipped = false;

    // ── Load words ──
    async function loadWords() {
      const res = await fetch('/api/words');
      allWords = await res.json();
      populateFilter();
      buildDeck();
    }

    function populateFilter() {
      const sel = document.getElementById('book-filter');
      const books = [...new Set(allWords.map(w => w.book_title).filter(Boolean))];
      books.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', buildDeck);
    }

    function buildDeck() {
      const filter = document.getElementById('book-filter').value;
      deck = allWords.filter(w => !filter || w.book_title === filter);
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      document.getElementById('deck-count').textContent =
        deck.length === 0 ? 'No cards' : `${deck.length} card${deck.length !== 1 ? 's' : ''}`;
      render();
    }

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      render();
    });

    // ── Render ──
    function render() {
      const app = document.getElementById('app');

      if (allWords.length === 0) {
        app.innerHTML = `
          <div class="state-screen">
            <div class="state-emoji">📖</div>
            <div class="state-title">No words yet</div>
            <div class="state-sub">Go read a book and click words to save them. They'll appear here as flashcards.</div>
            <a href="/" class="btn btn-ghost" style="margin-top:8px">Go to Library →</a>
          </div>`;
        return;
      }

      if (deck.length === 0) {
        app.innerHTML = `
          <div class="state-screen">
            <div class="state-emoji">🔍</div>
            <div class="state-title">No cards in this deck</div>
            <div class="state-sub">Select a different book filter above.</div>
          </div>`;
        return;
      }

      if (currentIdx >= deck.length) {
        renderDone();
        return;
      }

      const word = deck[currentIdx];
      const sentence = highlightWord(word.sentence || '', word.word);
      const progress = Math.round((currentIdx / deck.length) * 100);

      app.innerHTML = `
        <div class="progress-area">
          <div class="progress-row">
            <span class="progress-label">Card ${currentIdx + 1} of ${deck.length}</span>
            <span class="progress-counter">${progress}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${progress}%"></div>
          </div>
        </div>

        <div class="card-area">
          <div class="card-scene">
            <div class="flashcard" id="flashcard">
              <div class="card-face card-front">
                <div class="card-front-label">Spanish</div>
                <div class="card-word">${word.word}</div>
                <div class="card-source">${word.book_title || ''}</div>
                <div class="card-hint">Click to reveal · Space</div>
              </div>
              <div class="card-face card-back">
                <div class="card-back-label">Translation</div>
                <div class="card-translation">${word.translation}</div>
                ${sentence ? `
                  <div class="card-divider"></div>
                  <div class="card-sentence">${sentence}</div>
                ` : ''}
                ${word.chapter_title ? `<div class="card-chapter">${word.chapter_title}</div>` : ''}
              </div>
            </div>
          </div>

          <div class="card-buttons">
            <button class="answer-btn btn-dont" id="btn-dont" disabled>
              ✕ Don't know
              <small>← arrow</small>
            </button>
            <button class="answer-btn btn-know" id="btn-know" disabled>
              ✓ Know it
              <small>→ arrow</small>
            </button>
          </div>

          <div class="key-hints">
            <kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>→</kbd> know &nbsp;·&nbsp; <kbd>←</kbd> don't know
          </div>
        </div>
      `;

      document.getElementById('flashcard').addEventListener('click', flipCard);
    }

    function renderDone() {
      launchConfetti();
      document.getElementById('app').innerHTML = `
        <div class="state-screen">
          <div class="state-emoji">🎉</div>
          <div class="state-title">Session complete!</div>
          <div class="state-sub">You reviewed ${deck.length} word${deck.length !== 1 ? 's' : ''}. Keep it up!</div>
          <div class="state-stats">
            <div class="stat">
              <div class="stat-num green">${known}</div>
              <div class="stat-label">Knew it</div>
            </div>
            <div class="stat">
              <div class="stat-num red">${unknown}</div>
              <div class="stat-label">Didn't know</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-ghost" onclick="restartDeck()">↺ Again</button>
            <a href="/" class="btn btn-ghost">← Library</a>
          </div>
        </div>`;
    }

    function highlightWord(sentence, word) {
      if (!sentence || !word) return sentence;
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return sentence.replace(
        new RegExp(`(${escaped})`, 'gi'),
        '<span class="highlight">$1</span>'
      );
    }

    // ── Flip ──
    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!card) return;
      flipped = !flipped;
      card.classList.toggle('flipped', flipped);
      if (flipped) {
        document.getElementById('btn-know').disabled = false;
        document.getElementById('btn-dont').disabled = false;
      }
    }

    // ── Answer ──
    function answer(didKnow) {
      if (!flipped) return;
      if (didKnow) known++; else unknown++;
      currentIdx++;
      flipped = false;
      render();
    }

    function restartDeck() {
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      render();
    }

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') answer(true);
      if (e.key === 'ArrowLeft') answer(false);
    });

    // Delegate button clicks
    document.addEventListener('click', e => {
      if (e.target.closest('#btn-know')) answer(true);
      if (e.target.closest('#btn-dont')) answer(false);
    });

    // ── Confetti ──
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: -20,
        w: Math.random() * 10 + 6,
        h: Math.random() * 6 + 4,
        color: ['#7c3aed','#a78bfa','#22c55e','#fbbf24','#f472b6','#60a5fa'][Math.floor(Math.random()*6)],
        vx: (Math.random() - 0.5) * 3,
        vy: Math.random() * 4 + 2,
        angle: Math.random() * 360,
        va: (Math.random() - 0.5) * 6
      }));

      let frame;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of pieces) {
          p.x += p.vx; p.y += p.vy; p.angle += p.va; p.vy += 0.05;
          if (p.y < canvas.height + 20) alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
        if (alive) frame = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
      setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 4000);
    }

    loadWords();
  </script>
</body>
</html>
