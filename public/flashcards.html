<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingLo — Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #d4874a;
      --purple-dim: #a85f2e;
      --purple-glow: rgba(212,135,74,0.15);
      --green: #6aaa7a;
      --red: #e07070;
      --bg: #1a1612;
      --surface: #231e18;
      --surface2: #2e2720;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.11);
      --text: #ede0cc;
      --text-muted: rgba(237,224,204,0.42);
      --font-ui: 'Inter', -apple-system, sans-serif;
      --font-read: 'Lora', Georgia, serif;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      height: 54px;
      flex-shrink: 0;
      gap: 12px;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
      font-family: var(--font-read);
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover { background: var(--surface2); }
    .btn-danger {
      background: rgba(239,68,68,0.12);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.22); }

    /* ── View tabs ── */
    .view-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-tab {
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .view-tab.active {
      background: var(--purple-dim);
      color: #fff;
    }

    /* ── Tool bar ── */
    .deck-bar {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .deck-bar select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.84rem;
      font-family: inherit;
      cursor: pointer;
    }
    .deck-bar select option { background: var(--surface2); }
    .deck-count { font-size: 0.84rem; color: var(--text-muted); }
    .search-input {
      flex: 1;
      min-width: 140px;
      max-width: 280px;
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.84rem;
      font-family: inherit;
      padding: 6px 10px;
      outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--purple); }
    .deck-bar .btn-ghost {
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    /* ── Flashcard view ── */
    .progress-area {
      padding: 18px 20px 0;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.83rem;
    }
    .progress-label { color: var(--text-muted); }
    .progress-counter { color: white; font-weight: 600; }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-dim), var(--purple));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 24px;
    }

    .card-scene {
      perspective: 1200px;
      width: min(540px, 100%);
      height: 300px;
    }
    .flashcard {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      padding: 32px 36px;
    }

    .card-front {
      background: white;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card-front-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 14px;
    }
    .card-word {
      font-family: var(--font-read);
      font-size: 2.4rem;
      font-weight: 600;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .card-source { font-size: 0.76rem; color: #9ca3af; font-style: italic; }
    .card-hint {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.76rem;
      color: #9ca3af;
      opacity: 0.7;
    }

    .card-back {
      background: linear-gradient(145deg, #2a1608, #4a2010);
      transform: rotateY(180deg);
      border: 1px solid rgba(212,135,74,0.2);
      justify-content: center;
      position: relative;
    }
    .card-back-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 12px;
    }
    .card-translation {
      font-family: var(--font-read);
      font-size: 1.85rem;
      font-weight: 600;
      color: white;
      margin-bottom: 18px;
      line-height: 1.2;
    }
    .card-divider { height: 1px; background: rgba(212,135,74,0.2); margin-bottom: 16px; }
    .card-sentence {
      font-size: 0.86rem;
      color: rgba(237,224,204,0.6);
      line-height: 1.7;
      font-style: italic;
    }
    .card-sentence .highlight {
      color: var(--purple);
      font-weight: 600;
      font-style: normal;
      background: rgba(212,135,74,0.2);
      border-radius: 3px;
      padding: 0 3px;
    }
    .card-chapter { margin-top: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    .rarity {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      margin-top: 8px;
    }
    .rarity-common  { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .rarity-moderate{ background: rgba(234,179,8,0.15);  color: #ca8a04; border: 1px solid rgba(234,179,8,0.3); }
    .rarity-rare    { background: rgba(249,115,22,0.15); color: #ea580c; border: 1px solid rgba(249,115,22,0.3); }
    .rarity-very-rare{ background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

    .card-delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(239,68,68,0.12);
      color: rgba(239,68,68,0.7);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .card-delete-btn:hover { background: rgba(239,68,68,0.25); color: var(--red); }

    .card-buttons {
      display: flex;
      gap: 14px;
      width: min(540px, 100%);
    }
    .answer-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .answer-btn small { font-size: 0.7rem; font-weight: 400; opacity: 0.7; }
    .btn-know {
      background: rgba(34,197,94,0.12);
      color: var(--green);
      border: 1.5px solid rgba(34,197,94,0.25);
    }
    .btn-know:hover { background: rgba(34,197,94,0.22); }
    .btn-dont {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1.5px solid rgba(239,68,68,0.2);
    }
    .btn-dont:hover { background: rgba(239,68,68,0.2); }
    .answer-btn:disabled { opacity: 0.3; cursor: default; }

    .key-hints { font-size: 0.73rem; color: var(--text-muted); text-align: center; }
    .key-hints kbd {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
    }

    /* ── Empty / done states ── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 14px;
    }
    .state-emoji { font-size: 3.5rem; }
    .state-title { font-size: 1.7rem; font-weight: 700; }
    .state-sub { color: var(--text-muted); max-width: 360px; line-height: 1.6; }
    .state-stats { display: flex; gap: 32px; margin-top: 6px; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-num { font-size: 2rem; font-weight: 700; }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--red); }

    /* Confetti canvas */
    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

    /* ── List view ── */
    #list-view {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .word-list {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .word-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .word-item:hover { border-color: var(--purple-dim); }
    .word-item.deleting { opacity: 0.4; pointer-events: none; }

    .word-item-main { min-width: 0; }
    .word-item-row1 {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .wi-word {
      font-family: var(--font-read);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }
    .wi-arrow { color: var(--text-muted); font-size: 0.9rem; }
    .wi-translation {
      font-size: 1rem;
      color: var(--purple);
      font-weight: 500;
    }
    .wi-sentence {
      font-size: 0.83rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .wi-sentence .highlight {
      color: var(--purple);
      font-style: normal;
      font-weight: 500;
      background: var(--purple-glow);
      border-radius: 3px;
      padding: 0 2px;
    }
    .wi-meta {
      display: flex;
      gap: 14px;
      font-size: 0.73rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .wi-meta-item { display: flex; align-items: center; gap: 4px; }

    .wi-delete {
      background: rgba(239,68,68,0.09);
      color: rgba(239,68,68,0.6);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .wi-delete:hover { background: rgba(239,68,68,0.22); color: var(--red); border-color: rgba(239,68,68,0.35); }
    .wi-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .wi-speak {
      background: var(--purple-glow);
      color: var(--purple-dim);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .wi-speak:hover { background: rgba(212,135,74,0.25); color: var(--purple); border-color: var(--purple-dim); }

    .card-speak-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(212,135,74,0.12);
      color: rgba(212,135,74,0.8);
      border: 1px solid rgba(212,135,74,0.2);
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .card-speak-btn:hover { background: rgba(212,135,74,0.25); color: var(--purple); }

    .list-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .list-empty .state-emoji { font-size: 2.5rem; margin-bottom: 12px; }


    /* ── Light theme ── */
    body.theme-light {
      --purple: #8b4513; --purple-dim: #7c3d0f; --purple-glow: rgba(139,69,19,0.1);
      --green: #2e7d52; --red: #c0392b;
      --bg: #faf7f2; --surface: #f2ece2; --surface2: #e8dfd0;
      --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.16);
      --text: #1e1610; --text-muted: rgba(30,22,16,0.48);
    }
    body.theme-light header { background: var(--bg); }
    body.theme-light .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-strong); }
    body.theme-light .btn-ghost:hover { background: var(--surface2); }
    body.theme-light .view-tab.active { background: var(--purple-dim); color: #fff; }
    body.theme-light .deck-bar select { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }
    body.theme-light .deck-bar select option { background: var(--surface2); }
    body.theme-light .search-input { background: var(--surface2); color: var(--text); border-color: var(--border-strong); }
    body.theme-light .progress-track { background: rgba(0,0,0,0.1); }
    body.theme-light .card-back { background: linear-gradient(145deg, #3d1a08, #6b2e10); border-color: rgba(212,135,74,0.25); }
    body.theme-light .card-sentence { color: rgba(237,224,204,0.7); }
    body.theme-light .card-sentence .highlight { background: rgba(212,135,74,0.25); color: var(--purple); }

    /* ── E-reader (e-ink) theme ── */
    body.theme-ereader {
      --purple: #000000; --purple-dim: #222222; --purple-glow: rgba(0,0,0,0.05);
      --green: #000000; --red: #000000;
      --bg: #ffffff; --surface: #ffffff; --surface2: #eeeeee;
      --border: rgba(0,0,0,0.25); --text: #000000; --text-muted: #555555;
    }
    body.theme-ereader *, body.theme-ereader *::before, body.theme-ereader *::after {
      transition: none !important; animation: none !important;
    }
    body.theme-ereader header { background: #ffffff; }
    body.theme-ereader .btn-ghost { background: #f0f0f0; color: #222; border-color: rgba(0,0,0,0.25); }
    body.theme-ereader .view-tab.active { background: rgba(0,0,0,0.15); color: #000; }
    body.theme-ereader .deck-bar select { background: #fff; color: #000; border-color: rgba(0,0,0,0.3); }
    body.theme-ereader .deck-bar select option { background: #fff; }
    body.theme-ereader .search-input { background: #fff; color: #000; border-color: rgba(0,0,0,0.3); }
    body.theme-ereader .progress-track { background: rgba(0,0,0,0.12); }
    body.theme-ereader .progress-fill { background: #000; }
    body.theme-ereader .card-back { background: #eeeeee; border-color: rgba(0,0,0,0.3); }
    body.theme-ereader .card-back-label { color: #000; }
    body.theme-ereader .card-translation { color: #000; }
    body.theme-ereader .card-sentence { color: #444; }
    body.theme-ereader .card-sentence .highlight { background: rgba(0,0,0,0.1); color: #000; font-style: normal; }
    body.theme-ereader .card-hint { color: #555; }
    body.theme-ereader .freq-dot { background: #ccc; }
    body.theme-ereader .freq-dot.filled { background: #000; }
    body.theme-ereader .card-speak-btn, body.theme-ereader .card-delete-btn { background: #f0f0f0; color: #333; border-color: rgba(0,0,0,0.2); }
    body.theme-ereader .btn-know { background: rgba(0,0,0,0.05); color: #222; border-color: rgba(0,0,0,0.25); }
    body.theme-ereader .btn-dont { background: rgba(0,0,0,0.05); color: #222; border-color: rgba(0,0,0,0.25); }
    body.theme-ereader .word-item { border-color: rgba(0,0,0,0.2); }
    body.theme-ereader .wi-translation { color: #222; }
    body.theme-ereader .wi-sentence .highlight { background: rgba(0,0,0,0.1); color: #000; }
    body.theme-ereader .wi-meta { color: rgba(0,0,0,0.4); }
    body.theme-ereader .wi-freq-dot { background: #ccc; }
    body.theme-ereader .wi-freq-dot.filled { background: #000; }
    body.theme-ereader .wi-speak, body.theme-ereader .wi-delete { background: #f0f0f0; color: #333; border-color: rgba(0,0,0,0.2); }
    body.theme-ereader .key-hints { color: rgba(0,0,0,0.3); }
    body.theme-ereader .key-hints kbd { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.15); }
    body.theme-ereader .card-sentence .highlight, body.theme-ereader .wi-sentence .highlight { background: rgba(0,0,0,0.1); color: #000; }
  </style>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('linglo_settings') || '{}');
        if (s.theme === 'light') document.body.classList.add('theme-light');
        if (s.theme === 'ereader') document.body.classList.add('theme-ereader');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <header>
    <a class="logo" href="/">LingLo</a>
    <div class="view-tabs">
      <button class="view-tab" id="tab-cards">Cards</button>
      <button class="view-tab active" id="tab-list">List</button>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost" id="shuffle-btn" style="display:none">⇄ Shuffle</button>
      <a href="/" class="btn btn-ghost">← Library</a>
    </div>
  </header>

  <div class="deck-bar">
    <select id="book-filter"><option value="">All books</option></select>
    <select id="type-filter">
      <option value="">All types</option>
      <option value="word">Words only</option>
      <option value="phrase">Phrases only</option>
    </select>
    <select id="rarity-filter">
      <option value="">All rarity</option>
      <option value="common">Common</option>
      <option value="moderate">Moderate</option>
      <option value="rare">Rare</option>
      <option value="very-rare">Very rare</option>
      <option value="unknown">Unknown</option>
    </select>
    <select id="meta-filter">
      <option value="">All metadata</option>
      <option value="has-sentence">With sentence</option>
      <option value="no-sentence">Without sentence</option>
      <option value="has-chapter">With chapter</option>
      <option value="no-chapter">Without chapter</option>
    </select>
    <select id="sort-select">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="word-az">Word A-Z</option>
      <option value="word-za">Word Z-A</option>
      <option value="translation-az">Translation A-Z</option>
      <option value="translation-za">Translation Z-A</option>
      <option value="book-az">Book A-Z</option>
      <option value="chapter-az">Chapter A-Z</option>
      <option value="rarity-common-first">Common first</option>
      <option value="rarity-rare-first">Rare first</option>
      <option value="shortest">Shortest first</option>
      <option value="longest">Longest first</option>
    </select>
    <input class="search-input" id="search-input" placeholder="Search words…" autocomplete="off">
    <button class="btn btn-ghost" id="reset-filters-btn">Reset</button>
    <span class="deck-count" id="deck-count"></span>
  </div>

  <div id="cards-view" style="display:none">
    <div id="app"></div>
  </div>

  <div id="list-view">
    <div class="word-list" id="word-list"></div>
  </div>

  <script>
    let allWords = [];
    let rarityMap = {};
    let deck = [];
    let currentIdx = 0;
    let known = 0;
    let unknown = 0;
    let flipped = false;
    let currentView = 'list'; // 'cards' | 'list'
    const filterStorageKey = 'linglo_flashcards_filters';

    function rarityBadge(zipf) {
      if (zipf === null || zipf === undefined) return '';
      let label, cls;
      if (zipf >= 5)      { label = 'Common';    cls = 'rarity-common'; }
      else if (zipf >= 3) { label = 'Moderate';  cls = 'rarity-moderate'; }
      else if (zipf >= 1) { label = 'Rare';      cls = 'rarity-rare'; }
      else                { label = 'Very rare'; cls = 'rarity-very-rare'; }
      return `<span class="rarity ${cls}">${label}</span>`;
    }

    function normalizeText(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/[áàäâ]/g, 'a')
        .replace(/[éèëê]/g, 'e')
        .replace(/[íìïî]/g, 'i')
        .replace(/[óòöô]/g, 'o')
        .replace(/[úùüû]/g, 'u');
    }

    function getWordType(word) {
      return /\s/.test((word || '').trim()) ? 'phrase' : 'word';
    }

    function getRarityBucket(zipf) {
      if (zipf === null || zipf === undefined || zipf === '') return 'unknown';
      if (zipf >= 5) return 'common';
      if (zipf >= 3) return 'moderate';
      if (zipf >= 1) return 'rare';
      return 'very-rare';
    }

    // ── Load words ──
    async function loadWords() {
      const res = await fetch('/api/words');
      allWords = await res.json();
      // Batch-fetch rarity for all words
      try {
        const words = [...new Set(allWords.map(w => w.word))];
        const r = await fetch('/api/rarity', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ words }) });
        rarityMap = await r.json();
      } catch { rarityMap = {}; }
      populateFilter();
      restoreFilterState();
      rebuildView();
    }

    function populateFilter() {
      const sel = document.getElementById('book-filter');
      // Keep only "All books" and re-add book options
      while (sel.options.length > 1) sel.remove(1);
      const books = [...new Set(allWords.map(w => w.book_title).filter(Boolean))].sort();
      books.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        sel.appendChild(opt);
      });
    }

    function getFilter() { return document.getElementById('book-filter').value; }
    function getTypeFilter() { return document.getElementById('type-filter').value; }
    function getRarityFilter() { return document.getElementById('rarity-filter').value; }
    function getMetaFilter() { return document.getElementById('meta-filter').value; }
    function getSort() { return document.getElementById('sort-select').value; }
    function getSearch() { return normalizeText(document.getElementById('search-input').value.trim()); }

    function saveFilterState() {
      try {
        localStorage.setItem(filterStorageKey, JSON.stringify({
          book: getFilter(),
          type: getTypeFilter(),
          rarity: getRarityFilter(),
          meta: getMetaFilter(),
          sort: getSort(),
          search: document.getElementById('search-input').value
        }));
      } catch {}
    }

    function restoreFilterState() {
      try {
        const saved = JSON.parse(localStorage.getItem(filterStorageKey) || '{}');
        if (saved.book !== undefined) document.getElementById('book-filter').value = saved.book;
        if (saved.type !== undefined) document.getElementById('type-filter').value = saved.type;
        if (saved.rarity !== undefined) document.getElementById('rarity-filter').value = saved.rarity;
        if (saved.meta !== undefined) document.getElementById('meta-filter').value = saved.meta;
        if (saved.sort !== undefined) document.getElementById('sort-select').value = saved.sort;
        if (saved.search !== undefined) document.getElementById('search-input').value = saved.search;
      } catch {}
    }

    function getFilteredWords() {
      const filter = getFilter();
      const typeFilter = getTypeFilter();
      const rarityFilter = getRarityFilter();
      const metaFilter = getMetaFilter();
      const search = getSearch();
      const filtered = allWords.filter(w => {
        const wordType = getWordType(w.word);
        const rarity = getRarityBucket(w.frequency);
        if (filter && w.book_title !== filter) return false;
        if (typeFilter && wordType !== typeFilter) return false;
        if (rarityFilter && rarity !== rarityFilter) return false;
        if (metaFilter === 'has-sentence' && !w.sentence) return false;
        if (metaFilter === 'no-sentence' && w.sentence) return false;
        if (metaFilter === 'has-chapter' && !w.chapter_title) return false;
        if (metaFilter === 'no-chapter' && w.chapter_title) return false;
        if (search) {
          return normalizeText(w.word).includes(search)
            || normalizeText(w.translation).includes(search)
            || normalizeText(w.sentence || '').includes(search)
            || normalizeText(w.book_title || '').includes(search)
            || normalizeText(w.chapter_title || '').includes(search);
        }
        return true;
      });
      const sort = getSort();
      const sorted = [...filtered];
      sorted.sort((a, b) => {
        const wordA = normalizeText(a.word);
        const wordB = normalizeText(b.word);
        const translationA = normalizeText(a.translation);
        const translationB = normalizeText(b.translation);
        const bookA = normalizeText(a.book_title || '');
        const bookB = normalizeText(b.book_title || '');
        const chapterA = normalizeText(a.chapter_title || '');
        const chapterB = normalizeText(b.chapter_title || '');
        const dateA = new Date(a.created_at || 0).getTime();
        const dateB = new Date(b.created_at || 0).getTime();
        const rarityA = a.frequency ?? -Infinity;
        const rarityB = b.frequency ?? -Infinity;
        const lenA = (a.word || '').length;
        const lenB = (b.word || '').length;

        switch (sort) {
          case 'oldest': return dateA - dateB;
          case 'word-az': return wordA.localeCompare(wordB);
          case 'word-za': return wordB.localeCompare(wordA);
          case 'translation-az': return translationA.localeCompare(translationB);
          case 'translation-za': return translationB.localeCompare(translationA);
          case 'book-az': return bookA.localeCompare(bookB) || wordA.localeCompare(wordB);
          case 'chapter-az': return chapterA.localeCompare(chapterB) || wordA.localeCompare(wordB);
          case 'rarity-common-first': return rarityB - rarityA || wordA.localeCompare(wordB);
          case 'rarity-rare-first': return rarityA - rarityB || wordA.localeCompare(wordB);
          case 'shortest': return lenA - lenB || wordA.localeCompare(wordB);
          case 'longest': return lenB - lenA || wordA.localeCompare(wordB);
          case 'newest':
          default:
            return dateB - dateA;
        }
      });
      return sorted;
    }

    function rebuildView() {
      saveFilterState();
      if (currentView === 'cards') buildDeck();
      else renderList();
      updateCount();
    }

    function updateCount() {
      const words = getFilteredWords();
      const el = document.getElementById('deck-count');
      el.textContent = words.length === 0 ? 'No words' : `${words.length} word${words.length !== 1 ? 's' : ''}`;
    }

    // ── View toggle ──
    document.getElementById('tab-cards').addEventListener('click', () => switchView('cards'));
    document.getElementById('tab-list').addEventListener('click', () => switchView('list'));

    function switchView(view) {
      currentView = view;
      document.getElementById('tab-cards').classList.toggle('active', view === 'cards');
      document.getElementById('tab-list').classList.toggle('active', view === 'list');
      document.getElementById('cards-view').style.display = view === 'cards' ? '' : 'none';
      document.getElementById('list-view').style.display = view === 'list' ? '' : 'none';
      document.getElementById('shuffle-btn').style.display = view === 'cards' ? '' : 'none';
      document.getElementById('search-input').style.display = view === 'list' ? '' : 'none';
      rebuildView();
    }

    // ── Filters ──
    document.getElementById('book-filter').addEventListener('change', rebuildView);
    document.getElementById('type-filter').addEventListener('change', rebuildView);
    document.getElementById('rarity-filter').addEventListener('change', rebuildView);
    document.getElementById('meta-filter').addEventListener('change', rebuildView);
    document.getElementById('sort-select').addEventListener('change', rebuildView);
    document.getElementById('search-input').addEventListener('input', () => {
      if (currentView === 'list') renderList();
      updateCount();
    });
    document.getElementById('reset-filters-btn').addEventListener('click', () => {
      document.getElementById('book-filter').value = '';
      document.getElementById('type-filter').value = '';
      document.getElementById('rarity-filter').value = '';
      document.getElementById('meta-filter').value = '';
      document.getElementById('sort-select').value = 'newest';
      document.getElementById('search-input').value = '';
      rebuildView();
    });

    // ── Deck (cards view) ──
    function buildDeck() {
      deck = getFilteredWords();
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      render();
    }

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      render();
    });

    // ── Render flashcards ──
    function render() {
      const app = document.getElementById('app');

      if (allWords.length === 0) {
        app.innerHTML = `
          <div class="state-screen">
            <div class="state-emoji">📖</div>
            <div class="state-title">No words yet</div>
            <div class="state-sub">Go read a book and click words to save them. They'll appear here as flashcards.</div>
            <a href="/" class="btn btn-ghost" style="margin-top:8px">Go to Library →</a>
          </div>`;
        return;
      }

      if (deck.length === 0) {
        app.innerHTML = `
          <div class="state-screen">
            <div class="state-emoji">🔍</div>
            <div class="state-title">No cards in this deck</div>
            <div class="state-sub">Try a different filter.</div>
          </div>`;
        return;
      }

      if (currentIdx >= deck.length) {
        renderDone();
        return;
      }

      const word = deck[currentIdx];
      const sentence = highlightWord(word.sentence || '', word.word);
      const progress = Math.round((currentIdx / deck.length) * 100);

      app.innerHTML = `
        <div class="progress-area">
          <div class="progress-row">
            <span class="progress-label">Card ${currentIdx + 1} of ${deck.length}</span>
            <span class="progress-counter">${progress}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${progress}%"></div>
          </div>
        </div>

        <div class="card-area">
          <div class="card-scene">
            <div class="flashcard" id="flashcard">
              <div class="card-face card-front">
                <div class="card-front-label">Spanish</div>
                <div class="card-word">${word.word}</div>
                ${rarityBadge(rarityMap[word.word] ?? null)}
                <button class="card-speak-btn" id="card-speak-btn" title="Pronounce">🔊</button>
                <div class="card-source">${word.book_title || ''}</div>
                <div class="card-hint">Click to reveal · Space</div>
              </div>
              <div class="card-face card-back">
                <button class="card-delete-btn" id="card-delete-btn" title="Delete word">🗑 Delete</button>
                <div class="card-back-label">Translation</div>
                <div class="card-translation">${word.translation}</div>
                ${sentence ? `
                  <div class="card-divider"></div>
                  <div class="card-sentence">${sentence}</div>
                ` : ''}
                ${word.chapter_title ? `<div class="card-chapter">${word.chapter_title}</div>` : ''}
              </div>
            </div>
          </div>

          <div class="card-buttons">
            <button class="answer-btn btn-dont" id="btn-dont" disabled>
              ✕ Don't know
              <small>← arrow</small>
            </button>
            <button class="answer-btn btn-know" id="btn-know" disabled>
              ✓ Know it
              <small>→ arrow</small>
            </button>
          </div>

          <div class="key-hints">
            <kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>→</kbd> know &nbsp;·&nbsp; <kbd>←</kbd> don't know
          </div>
        </div>
      `;

      document.getElementById('flashcard').addEventListener('click', e => {
        if (e.target.closest('#card-delete-btn')) return;
        if (e.target.closest('#card-speak-btn')) return;
        flipCard();
      });

      document.getElementById('card-speak-btn').addEventListener('click', e => {
        e.stopPropagation();
        speak(word.word);
      });

      document.getElementById('card-delete-btn').addEventListener('click', async e => {
        e.stopPropagation();
        await deleteWord(word.id);
        // Remove from deck and continue
        deck.splice(currentIdx, 1);
        if (currentIdx >= deck.length && currentIdx > 0) currentIdx--;
        flipped = false;
        render();
        updateCount();
      });
    }

    function renderDone() {
      launchConfetti();
      document.getElementById('app').innerHTML = `
        <div class="state-screen">
          <div class="state-emoji">🎉</div>
          <div class="state-title">Session complete!</div>
          <div class="state-sub">You reviewed ${deck.length} word${deck.length !== 1 ? 's' : ''}. Keep it up!</div>
          <div class="state-stats">
            <div class="stat">
              <div class="stat-num green">${known}</div>
              <div class="stat-label">Knew it</div>
            </div>
            <div class="stat">
              <div class="stat-num red">${unknown}</div>
              <div class="stat-label">Didn't know</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-ghost" onclick="restartDeck()">↺ Again</button>
            <a href="/" class="btn btn-ghost">← Library</a>
          </div>
        </div>`;
    }

    // ── List view ──
    function renderList() {
      const words = getFilteredWords();
      const container = document.getElementById('word-list');

      if (words.length === 0) {
        container.innerHTML = `
          <div class="list-empty">
            <div class="state-emoji">🔍</div>
            <div>No words match your filter.</div>
          </div>`;
        return;
      }

      container.innerHTML = words.map(w => {
        const sentence = highlightWord(w.sentence || '', w.word);
        const date = w.created_at ? new Date(w.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        return `
          <div class="word-item" id="wi-${w.id}">
            <div class="word-item-main">
              <div class="word-item-row1">
                <span class="wi-word">${escHtml(w.word)}</span>
                ${rarityBadge(rarityMap[w.word] ?? null)}
                <span class="wi-arrow">→</span>
                <span class="wi-translation">${escHtml(w.translation)}</span>
              </div>
              ${sentence ? `<div class="wi-sentence">${sentence}</div>` : ''}
              <div class="wi-meta">
                ${w.book_title ? `<span class="wi-meta-item">📚 ${escHtml(w.book_title)}</span>` : ''}
                ${w.chapter_title ? `<span class="wi-meta-item">· ${escHtml(w.chapter_title)}</span>` : ''}
                ${date ? `<span class="wi-meta-item">· ${date}</span>` : ''}
              </div>
            </div>
            <div class="wi-actions">
              <button class="wi-speak" title="Pronounce" data-word="${escHtml(w.word)}">🔊</button>
              <button class="wi-delete" title="Delete" data-id="${w.id}">🗑</button>
            </div>
          </div>`;
      }).join('');

      // Speak buttons
      container.querySelectorAll('.wi-speak').forEach(btn => {
        btn.addEventListener('click', () => speak(btn.dataset.word));
      });

      // Delete buttons
      container.querySelectorAll('.wi-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.id);
          const item = document.getElementById(`wi-${id}`);
          item.classList.add('deleting');
          await deleteWord(id);
          item.remove();
          updateCount();
        });
      });
    }

    // ── Delete ──
    async function deleteWord(id) {
      await fetch(`/api/words/${id}`, { method: 'DELETE' });
      allWords = allWords.filter(w => w.id !== id);
    }

    // ── Helpers ──
    function highlightWord(sentence, word) {
      if (!sentence || !word) return sentence;
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return sentence.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
    }

    let _ttsAudio = null;
    async function speak(text) {
      if (!text) return;
      if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
      try {
        const res = await fetch(`/api/tts?text=${encodeURIComponent(text)}`);
        if (!res.ok) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        _ttsAudio = new Audio(url);
        _ttsAudio.onended = () => { URL.revokeObjectURL(url); _ttsAudio = null; };
        _ttsAudio.play();
      } catch {}
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Flip / Answer ──
    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!card) return;
      flipped = !flipped;
      card.classList.toggle('flipped', flipped);
      if (flipped) {
        document.getElementById('btn-know').disabled = false;
        document.getElementById('btn-dont').disabled = false;
      }
    }

    function answer(didKnow) {
      if (!flipped) return;
      if (didKnow) known++; else unknown++;
      currentIdx++;
      flipped = false;
      render();
    }

    function restartDeck() {
      currentIdx = 0;
      known = 0;
      unknown = 0;
      flipped = false;
      render();
    }

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      if (currentView !== 'cards') return;
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowRight') answer(true);
      if (e.key === 'ArrowLeft') answer(false);
    });

    document.addEventListener('click', e => {
      if (e.target.closest('#btn-know')) answer(true);
      if (e.target.closest('#btn-dont')) answer(false);
    });

    // ── Confetti ──
    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: -20,
        w: Math.random() * 10 + 6,
        h: Math.random() * 6 + 4,
        color: ['#d4874a','#a85f2e','#6aaa7a','#f0c060','#e07070','#60a5fa'][Math.floor(Math.random()*6)],
        vx: (Math.random() - 0.5) * 3,
        vy: Math.random() * 4 + 2,
        angle: Math.random() * 360,
        va: (Math.random() - 0.5) * 6
      }));

      let frame;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of pieces) {
          p.x += p.vx; p.y += p.vy; p.angle += p.va; p.vy += 0.05;
          if (p.y < canvas.height + 20) alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
        if (alive) frame = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
      setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 4000);
    }

    loadWords();
  </script>
</body>
</html>
