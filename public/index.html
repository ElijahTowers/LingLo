<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingLo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4.40">
  <style>
    .theme-picker {
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }
    body.theme-light .theme-picker {
      background: rgba(0,0,0,0.04);
    }
    body.theme-ereader .theme-picker {
      background: #f0f0f0;
      border-color: rgba(0,0,0,0.2);
    }
    .theme-btn {
      background: transparent;
      border: none;
      border-radius: 5px;
      padding: 4px 9px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.12s;
      white-space: nowrap;
    }
    .theme-btn:hover { color: var(--text); }
    .theme-btn.active {
      background: var(--purple-dim);
      color: #fff;
    }
    body.theme-ereader .theme-btn.active {
      background: #222;
      color: #fff;
    }
    .streak-widget {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    body.theme-ereader .streak-widget { background: #f8f8f8; border-color: rgba(0,0,0,0.15); }
    .streak-info { flex: 1; min-width: 0; }
    .streak-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .streak-count { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .streak-label { font-size: 0.82rem; color: var(--text-muted); }
    .streak-goal-text { font-size: 0.78rem; color: var(--text-muted); }
    /* Header streak circle */
    .streak-circle-btn { background: none; border: none; padding: 0; cursor: default; display: flex; align-items: center; flex-shrink: 0; }
    .continue-reading {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: linear-gradient(135deg, rgba(168,95,46,0.16), rgba(35,30,24,0.96));
      border: 1px solid rgba(212,135,74,0.28);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-md);
    }
    .continue-reading.visible { display: flex; }
    .continue-copy { min-width: 0; }
    .continue-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(237,224,204,0.62);
      margin-bottom: 8px;
    }
    .continue-title {
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.1;
      color: var(--text);
      font-family: var(--font-read);
      margin-bottom: 6px;
    }
    .continue-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .continue-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    body.theme-light .continue-reading {
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(242,236,226,0.96));
      border-color: rgba(139,69,19,0.24);
    }
    body.theme-light .continue-label { color: rgba(30,22,16,0.56); }
    body.theme-light .continue-action {
      border-color: rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.55);
    }
    body.theme-ereader .continue-reading {
      background: #f8f8f8;
      border-color: rgba(0,0,0,0.2);
      box-shadow: none;
    }
    body.theme-ereader .continue-label { color: #666666; }
    body.theme-ereader .continue-action {
      border-color: rgba(0,0,0,0.18);
      background: #ffffff;
      color: #000000;
    }
    @media (max-width: 540px) {
      .streak-widget { gap: 14px; padding: 14px 16px; margin-bottom: 20px; }
      .streak-count { font-size: 1.2rem; }
      .continue-reading {
        flex-direction: column;
        align-items: flex-start;
        padding: 16px;
        gap: 14px;
      }
      .continue-title { font-size: 1.15rem; }
      .continue-action { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('linglo_settings') || '{}');
        var t = s.theme || 'dark';
        if (t === 'light') document.body.classList.add('theme-light');
        if (t === 'ereader') document.body.classList.add('theme-ereader');
      } catch(e) {}
    })();
  </script>
  <header class="header">
    <div class="header-inner">
      <span class="logo">LingLo <span id="version-badge" class="version-badge"></span></span>
      <div class="theme-picker" id="theme-picker">
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="ereader">E-ink</button>
      </div>
      <div class="header-actions">
        <div class="streak-circle-btn" id="header-streak-circle" title="Daily reading goal"></div>
        <a href="/flashcards.html" class="btn btn-primary">
          ✦ Word list <span class="badge" id="word-count"></span>
        </a>
      </div>
    </div>
  </header>

  <main class="library-main">
    <div class="library-hero">
      <h1>Your Spanish Library</h1>
      <p>Click a book to start reading. Click any word to translate it.</p>
    </div>

    <a class="continue-reading" id="continue-reading" href="/">
      <div class="continue-copy">
        <div class="continue-label">Continue Reading</div>
        <div class="continue-title" id="continue-title"></div>
        <div class="continue-meta" id="continue-meta"></div>
      </div>
      <div class="continue-action">Resume book →</div>
    </a>

    <div class="streak-widget" id="streak-widget"></div>

    <div class="upload-area" id="upload-area">
      <div class="upload-icon">📚</div>
      <p>Drop an EPUB here or <label for="file-input" class="upload-link">browse</label></p>
      <input type="file" id="file-input" accept=".epub" hidden>
      <div id="upload-status"></div>
    </div>

    <p class="section-title">Books</p>
    <div class="book-grid" id="book-grid">
      <p class="empty-msg">Loading…</p>
    </div>
  </main>

  <script>
    function getSavedProgress(bookId) {
      try {
        const progress = JSON.parse(localStorage.getItem(`linglo-progress-${bookId}`));
        if (!progress || typeof progress.chapter !== 'number') return null;
        return {
          chapter: progress.chapter,
          ratio: typeof progress.ratio === 'number' ? Math.max(0, Math.min(1, progress.ratio)) : 0,
          total: typeof progress.total === 'number' ? progress.total : 0
        };
      } catch {
        return null;
      }
    }

    function getReaderHref(bookId, progress) {
      if (!progress) return `/reader.html?book=${bookId}`;
      return `/reader.html?book=${bookId}&ch=${progress.chapter}&r=${progress.ratio}`;
    }

    function getLastReaderState() {
      try {
        const href = localStorage.getItem('linglo-last-reader-url');
        if (!href) return null;
        const url = new URL(href, window.location.origin);
        const bookId = parseInt(url.searchParams.get('book'), 10);
        if (isNaN(bookId)) return null;
        const chapter = parseInt(url.searchParams.get('ch'), 10);
        const ratio = parseFloat(url.searchParams.get('r'));
        return {
          href: `${url.pathname}${url.search}`,
          bookId,
          chapter: isNaN(chapter) ? 0 : chapter,
          ratio: isNaN(ratio) ? 0 : Math.max(0, Math.min(1, ratio))
        };
      } catch {
        return null;
      }
    }

    function renderContinueReading(books) {
      const card = document.getElementById('continue-reading');
      const last = getLastReaderState();
      if (!last) return;
      const book = books.find(b => b.id === last.bookId);
      if (!book) return;
      const progress = getSavedProgress(book.id) || { chapter: last.chapter, ratio: last.ratio, total: 0 };
      const chapterLabel = `Chapter ${progress.chapter + 1}`;
      const pct = progress.total > 0
        ? Math.round(((progress.chapter + progress.ratio) / progress.total) * 100)
        : null;
      document.getElementById('continue-title').textContent = book.title;
      document.getElementById('continue-meta').textContent = pct === null
        ? `${book.author || 'Unknown author'} • ${chapterLabel}`
        : `${book.author || 'Unknown author'} • ${chapterLabel} • ${pct}% read`;
      card.href = getReaderHref(book.id, progress);
      card.classList.add('visible');
    }

    async function loadBooks() {
      const res = await fetch('/api/books');
      const books = await res.json();
      const grid = document.getElementById('book-grid');
      renderContinueReading(books);
      if (books.length === 0) {
        grid.innerHTML = '<p class="empty-msg">No books yet. Upload an EPUB above.</p>';
        return;
      }
      grid.innerHTML = books.map(b => {
        const progress = getSavedProgress(b.id);
        const pct = progress && progress.total > 0
          ? Math.round(((progress.chapter + progress.ratio) / progress.total) * 100)
          : 0;
        const progressBar = pct > 0
          ? `<div class="book-progress"><div class="book-progress-fill" style="width:${pct}%"></div></div>`
          : '';
        return `
        <a class="book-card" href="${getReaderHref(b.id, progress)}">
          <div class="book-spine"></div>
          <div class="book-cover">
            <div class="book-title">${b.title}</div>
            <div class="book-author">${b.author}</div>
            ${progressBar}
          </div>
        </a>`;
      }).join('');
    }

    async function loadWordCount() {
      const res = await fetch('/api/words');
      const words = await res.json();
      const badge = document.getElementById('word-count');
      badge.textContent = words.length > 0 ? words.length : '';
    }

    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-area');
    const status = document.getElementById('upload-status');

    async function uploadFile(file) {
      if (!file || !file.name.toLowerCase().endsWith('.epub')) {
        status.textContent = 'Only EPUB files are supported.';
        return;
      }
      status.textContent = 'Uploading…';
      const fd = new FormData();
      fd.append('epub', file);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) { status.textContent = 'Error: ' + data.error; return; }
        status.textContent = `"${data.title}" added!`;
        loadBooks();
        loadWordCount();
      } catch (err) {
        status.textContent = 'Upload failed.';
      }
    }

    fileInput.addEventListener('change', e => uploadFile(e.target.files[0]));
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      uploadFile(e.dataTransfer.files[0]);
    });

    fetch('/api/version').then(r => r.json()).then(d => {
      document.getElementById('version-badge').textContent = d.version;
    });

    // ── Theme picker ──
    (function() {
      var themes = ['dark', 'light', 'ereader'];
      function getTheme() {
        try { return JSON.parse(localStorage.getItem('linglo_settings') || '{}').theme || 'dark'; } catch(e) { return 'dark'; }
      }
      function setTheme(t) {
        document.body.classList.remove('theme-light', 'theme-ereader');
        if (t === 'light') document.body.classList.add('theme-light');
        if (t === 'ereader') document.body.classList.add('theme-ereader');
        try {
          var s = JSON.parse(localStorage.getItem('linglo_settings') || '{}');
          s.theme = t;
          localStorage.setItem('linglo_settings', JSON.stringify(s));
        } catch(e) {}
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.theme === t);
        });
      }
      // Init active state
      setTheme(getTheme());
      document.getElementById('theme-picker').addEventListener('click', function(e) {
        var btn = e.target.closest('.theme-btn');
        if (btn) setTheme(btn.dataset.theme);
      });
    })();

    function streakCircleSVG(pct, streak, size) {
      const r = size / 2 - 3;
      const circ = +(2 * Math.PI * r).toFixed(2);
      const offset = +(circ * (1 - Math.min(1, pct / 100))).toFixed(2);
      const goalMet = pct >= 100;
      const stroke = goalMet ? '#34d399' : '#a78bfa';
      const label = streak > 0 ? String(streak) : '';
      const fs = streak > 99 ? Math.round(size * 0.22) : Math.round(size * 0.28);
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${stroke}" stroke-width="2.5"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
          stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
        <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
          font-size="${fs}" font-weight="700" fill="${goalMet ? '#34d399' : 'currentColor'}" font-family="system-ui,sans-serif">${label}</text>
      </svg>`;
    }

    function renderStreak() {
      const today = new Date().toISOString().split('T')[0];
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      const yStr = yesterday.toISOString().split('T')[0];
      const last = localStorage.getItem('linglo-streak-last');
      const streak = (last === today || last === yStr) ? parseInt(localStorage.getItem('linglo-streak-count') || '0') : 0;
      const dailyWords = localStorage.getItem('linglo-daily-date') === today
        ? parseInt(localStorage.getItem('linglo-daily-words') || '0') : 0;
      const goal = 500;
      const goalMet = dailyWords >= goal;
      const pct = Math.min(100, Math.round(dailyWords / goal * 100));
      const streakMsg = streak >= 30 ? 'Legendary! 🏆' : streak >= 14 ? 'Unstoppable! 🚀' : streak >= 7 ? 'On fire! 🎉' : streak >= 3 ? 'Keep it up!' : streak === 1 ? 'Good start!' : 'Read 500 words to start your streak';
      document.getElementById('streak-widget').innerHTML = `
        ${streakCircleSVG(pct, streak, 48)}
        <div class="streak-info">
          <div class="streak-top">
            <span class="streak-count">${streak}</span>
            <span class="streak-label">day streak &nbsp;·&nbsp; ${streakMsg}</span>
          </div>
          <div class="streak-goal-text">${goalMet ? '✓ Daily goal reached!' : `${dailyWords} / ${goal} words today`}</div>
        </div>
      `;
      document.getElementById('header-streak-circle').innerHTML = streakCircleSVG(pct, streak, 30);
    }

    loadBooks();
    loadWordCount();
    renderStreak();
  </script>
</body>
</html>
